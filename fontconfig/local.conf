<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <include ignore_missing="yes">/etc/fonts/fonts.conf</include>

  <!-- Map common Traditional Chinese Kai names (Word/標楷體) to AR PL UKai TW on Linux -->
  <alias binding="strong">
    <family>標楷體</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>DFKai-SB</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>DFKaiShu-SB-Estd-BF</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>楷體</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>楷体</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>KaiTi</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>BiauKai</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
  <alias binding="strong">
    <family>標楷體-繁</family>
    <accept><family>AR PL UKai TW</family></accept>
  </alias>
</fontconfig>
